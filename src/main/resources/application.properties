spring.application.name=school-manager-api


spring.profiles.active=dev

# ===================================================================
# DATASOURCE (Base par défaut)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/edusecure_master
spring.datasource.username=${MASTER_DB_USERNAME:postgres}
spring.datasource.password=${MASTER_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===================================================================
# JPA / HIBERNATE
# ===================================================================
spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.show-sql=false

# ===================================================================
# JACKSON (Sérialisation JSON)
# ===================================================================
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# ===================================================================
# SERVEUR WEB
# ===================================================================
server.port=8080
server.servlet.context-path=/api/v1
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# ===================================================================
# CONFIGURATION MULTI-TENANT (Personnalisée)
# ===================================================================
multitenant.strategy=subdomain
multitenant.header-name=X-Tenant-ID
multitenant.isolation=database
multitenant.datasource-cache.enabled=true
multitenant.datasource-cache.maximum-size=50
multitenant.datasource-cache.expire-after-access=3600000

# ===================================================================
# SÉCURITÉ & JWT
# ===================================================================
jwt.secret=${JWT_SECRET:viveLecoleQuiVoulaitApprendreAEcrireDesTokensSecurises}
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.issuer=edusecure-api
jwt.include-tenant-in-token=true

# ===================================================================
# SPRINGDOC (OpenAPI / Swagger)
# ===================================================================
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.persist-authorization=true
springdoc.packages-to-scan=com.edusecure.controller
springdoc.show-actuator=false
springdoc.default-produces-media-type=application/json

# ===================================================================
# LOGGING
# ===================================================================
logging.level.com.edusecure=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/edusecure-application.log
logging.file.max-size=10MB
logging.file.max-history=7

# ===================================================================
# PROFIL DEV
# ===================================================================
---
spring.config.activate.on-profile=dev

spring.datasource.url=jdbc:postgresql://localhost:5432/edusecure_master_dev
spring.datasource.username=dev_user
spring.datasource.password=dev_password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

logging.level.com.edusecure=DEBUG
logging.level.org.springframework.security=DEBUG

# ===================================================================
# PROFIL PROD
# ===================================================================
---
spring.config.activate.on-profile=prod

spring.datasource.url=${MASTER_DB_URL}
spring.datasource.username=${MASTER_DB_USERNAME}
spring.datasource.password=${MASTER_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}

server.port=${PORT:8080}
server.error.include-stacktrace=never

logging.level.com.edusecure=WARN
logging.level.org.springframework.security=WARN